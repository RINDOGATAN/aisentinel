name: Publish image

# Builds the self-hosted app image and publishes it to GHCR, so the todo.law
# suite can PULL a pinned, prebuilt image instead of building from source on the
# customer's machine (the Donna model). Triggered by a semver tag (v1.2.3) or
# run manually with an explicit version.
#
# The published image bakes the LOCAL-SUITE defaults (localhost URLs) so it works
# out of the box for a firm running the suite on one machine. Custom-domain
# deployments still build from source until per-deployment NEXT_PUBLIC config is
# moved to runtime (tracked separately).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/rindogatan/aisentinel

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3   # arm64 emulation, so images run on Apple Silicon too
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: version
        run: echo "v=${{ github.event.inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/sovereign/Dockerfile
          target: runner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.v }}
            ${{ env.IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_APP_URL=http://localhost:8487
            NEXT_PUBLIC_DPO_CENTRAL_URL=http://localhost:8485
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # The runner image is a minimal standalone server with no Prisma CLI, so
      # migrations run from a companion "migrator" image (the builder stage,
      # which carries the tooling + migrate.sh + the migrations history).
      - name: Publish migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/sovereign/Dockerfile
          target: builder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/rindogatan/aisentinel-migrator:${{ steps.version.outputs.v }}
            ghcr.io/rindogatan/aisentinel-migrator:latest
          cache-from: type=gha
